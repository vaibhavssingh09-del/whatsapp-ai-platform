server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any path not matching a real file goes to index.html so
    # React Router's client-side routes (e.g. /broadcasts) work on a hard
    # refresh instead of nginx 404ing on them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxies API calls to the backend. BACKEND_ORIGIN is substituted at
    # container start (see docker-entrypoint.sh) rather than hardcoded,
    # because the right value differs by environment: in Docker Compose it's
    # the service name "http://backend:8000" (Compose's internal DNS); on
    # Render, where each service gets its own public *.onrender.com URL with
    # no shared internal network, it must be the backend service's full URL.
    location /api/ {
        proxy_pass BACKEND_ORIGIN/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
